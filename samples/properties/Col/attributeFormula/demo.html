<div class="demo-info">
  <strong>attribute+Formula 기본 패턴</strong>
  <p>조건에 따라 속성을 동적으로 결정하는 가장 기본적인 두 가지 패턴 — <code>Color</code> 속성과 <code>CanEdit</code> 속성을 활용합니다.</p>
  <ul>
    <li><strong>Color 속성 (ColorFormula)</strong>: 정수(Int) 값에 따라 배경색 변경 (100 미만 노란색, 이상 초록색)</li>
    <li><strong>CanEdit 속성 (CanEditFormula)</strong>: 체크박스(Bool) 값에 따라 다른 컬럼의 편집 가능 여부 결정</li>
  </ul>
</div>
