<div class="demo-info">
  <strong>attribute+Formula 기본 패턴 — Color · CanEdit</strong>
  <p>속성을 조건에 따라 동적으로 결정하는 가장 기본적인 두 가지 패턴을 보여줍니다.</p>
  <ul>
    <li><strong>ColorFormula</strong>: 정수(Int) 값에 따라 배경색 변경 (100 미만 노란색, 이상 초록색)</li>
    <li><strong>CanEditFormula</strong>: 체크박스(Bool) 값에 따라 다른 컬럼의 편집 가능 여부 결정</li>
  </ul>
  <em>핵심: function 형식에서 <code>fr.Value</code>(자기 셀 값), <code>fr.Row[컬럼명]</code>(같은 행의 다른 컬럼 값)으로 동적 계산.</em>
</div>
