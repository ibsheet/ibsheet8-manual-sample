<div class="demo-info">
  <strong>TypeFormula — 검사 항목별 결과 입력 Type 동적 변경 (Text ↔ Enum)</strong>
  <p>"검사 항목" 컬럼의 값에 따라 같은 행의 "결과" 컬럼의 Type 자체가 Text 또는 Enum으로 바뀝니다.</p>
  <ul>
    <li><strong>시력</strong> → <code>Text</code> (자유 입력: "1.5", "0.8" 등 수치)</li>
    <li><strong>색맹</strong> → <code>Enum</code> (사전 정의된 진단명: 정상 / 적록색맹 / 청황색맹)</li>
    <li><strong>청력</strong> → <code>Enum</code> (정상 / 경도난청 / 중도난청)</li>
  </ul>
</div>
