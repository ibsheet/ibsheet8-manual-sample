<div class="demo-info">
  <strong>TypeFormula — 숫자 Type 동적 전환 (Text/Int → Float)</strong>
  <p>Trigger 컬럼이 <code>convert</code>일 때, 두 컬럼이 Float로 전환됩니다.</p>
  <ul>
    <li><strong>TextToFloat</strong>: Text 출발 → Float (Format 셋팅으로 소수점 표시)</li>
    <li><strong>IntToFloat</strong>: Int 출발 → Float (Format을 Int용에서 Float용으로 교체)</li>
  </ul>
  <em>핵심: Float 전환 시 Format을 명시적으로 셋팅하지 않으면 출발 Type의 기본 Format이 적용돼 소수점이 잘리거나 표시가 깨질 수 있음.</em>
</div>
