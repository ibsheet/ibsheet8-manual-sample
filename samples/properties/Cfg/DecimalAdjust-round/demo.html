1. <b>정수(올림)</b> 컬럼은 <b>Cfg</b> 설정값에 의하여 소수점 첫째 자리에서 올림 처리됩니다.<br/>
2. <b>실수(내림)</b> 컬럼은 <b>Col</b> 설정값에 의하여 소수점 셋째 자리에서 내림 처리됩니다.<br/>
3. <b>실수(반올림)</b> 컬럼은 <b>Col</b> 설정값에 의하여 소수점 셋째 자리에서 반올림 처리됩니다.<br/>
4. <b>실수(반올림)</b> 컬럼의 3행 데이터는 <b>Cell</b> 설정값에 의하여 소수점 셋째 자리에서 내림 처리됩니다.<br/><br/>
